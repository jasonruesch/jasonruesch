# This workflow will download an pre-built artifact and do one of the following when a release is published:
# - Publish a package to GitHub Packages
# - Deploy a site to the Production environment

name: Release CD

on:
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  id-token: write
  packages: write
  pages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'deploy-${{ github.ref_name }}'
  cancel-in-progress: true

jobs:
  # Project Details job
  project-details:
    name: Project Details
    runs-on: ubuntu-latest
    # outputs:
    #   project: ${{ steps.details.outputs.project }}
    #   version: ${{ steps.details.outputs.version }}
    #   path: ${{ steps.details.outputs.path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # - name: Install dependencies
      #   run: npm ci --ignore-scripts

      - run: |
          echo "current=$GITHUB_REF_NAME"
          project=${GITHUB_REF_NAME%%@*}
          tags=$(gh release list --exclude-drafts --exclude-pre-releases --jq '.[].tagName ' --json tagName)
          previous=$(echo "$tags" | grep "^$project@" | head -2 | tail -1)
          echo "previous=$previous"
        env:
          GH_TOKEN: ${{ github.token }}

