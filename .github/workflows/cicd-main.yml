# This workflow will build and deploy a site to GitHub Pages

name: Main Branch CI/CD

on:
  push:
    branches:
      - 'main'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these deployments to complete.
concurrency:
  group: 'main'
  cancel-in-progress: false

jobs:
  # Affected job
  affected:
    name: Affected
    runs-on: ubuntu-latest
    outputs:
      libs-matrix: ${{ steps.libs.outputs.matrix }}
      apps-matrix: ${{ steps.apps.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run format check
        run: npx nx-cloud record -- nx format:check

      - name: Run affected lint and tests
        run: npx nx affected -t lint test e2e-ci

      - name: Affected libs
        id: libs
        run: |
          projects=$(npx nx show projects --projects libs/**/* --affected --with-target nx-release-publish | tr '\n' ' ' | xargs)
          list=($projects)
          items="["
          for project in "${list[@]}"; do
            path=$(npx nx show project $project | jq -r .root)
            items+="{\"project\":\"$project\",\"path\":\"$path\"},"
          done
          items=$(echo "$items" | sed 's/,$//g')
          items+="]"
          [[ $items = "[]" ]] && matrix="" || matrix="{\"include\":$items}"
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

      - name: Affected apps
        id: apps
        run: |
          projects=$(npx nx show projects --projects apps/**/* --affected --with-target build | tr '\n' ' ' | xargs)
          list=($projects)
          items="["
          for project in "${list[@]}"; do
            path=$(npx nx show project $project | jq -r .root)
            items+="{\"project\":\"$project\",\"path\":\"$path\"},"
          done
          items=$(echo "$items" | sed 's/,$//g')
          items+="]"
          [[ $items = "[]" ]] && matrix="" || matrix="{\"include\":$items}"
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

      - name: Build affected non-publishable libs
        run: npx nx affected -t build --exclude ${{ steps.libs.outputs.projects }}

  # Build job
  build-lib:
    name: Build Library
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.libs-matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.libs-matrix) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Update version
        run: npx nx release version --projects ${{ matrix.project }} --git-commit=false --stage-changes=false --git-tag

      # Fallback to version from latest tag for this project if update version didn't run
      # This can happen if the project didn't have any direct changes, but was affected by a changed dependency
      - name: Version
        id: version
        run: |
          version=$(npm pkg get version --prefix=${{ matrix.path }})
          version="${version//\"/}"
          echo "$version"
          if [[ $version == *"-development" ]]; then
            version=$(git describe --tags --match="${{ matrix.project }}@*" --abbrev=0)
            version="${version##*@}"
            echo "$version"
            npm pkg set version="$version" --prefix=${{ matrix.path }}
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build
        run: npx nx build ${{ matrix.project }} --skip-nx-cache

      # Upload artifact for publishing to GitHub Packages
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ matrix.project }}@${{ steps.version.outputs.version }}'
          path: ./dist/${{ matrix.path }}

      - name: Push tags
        run: git push --tags

  # Build job
  build-app:
    name: Build App
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.apps-matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.apps-matrix) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Update version
        run: npx nx release version --projects ${{ matrix.project }} --git-commit=false --stage-changes=false --git-tag

      # Fallback to version from latest tag for this project if update version didn't run
      # This can happen if the project didn't have any direct changes, but was affected by a changed dependency
      - name: Version
        id: version
        run: |
          version=$(npm pkg get version --prefix=${{ matrix.path }})
          version="${version//\"/}"
          echo "$version"
          if [[ $version == *"-development" ]]; then
            version=$(git describe --tags --match="${{ matrix.project }}@*" --abbrev=0)
            version="${version##*@}"
            echo "$version"
            npm pkg set version="$version" --prefix=${{ matrix.path }}
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build
        run: npx nx build ${{ matrix.project }} --skip-nx-cache

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Upload artifact for Staging deployment to GitHub Pages
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: 'github-pages-${{ matrix.project }}@${{ steps.version.outputs.version }}'
          path: ./dist/${{ matrix.path }}

      # Upload artifact for Production deployment to another repository
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ matrix.project }}@${{ steps.version.outputs.version }}'
          path: ./dist/${{ matrix.path }}

      - name: Push tags
        run: git push --tags

  # Deployment job
  deploy-staging:
    name: Deploy to Staging
    environment:
      name: Staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - affected
      - build-app
    if: ${{ needs.affected.outputs.apps-matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.apps-matrix) }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: 'github-pages-${{ matrix.project }}@${{ needs.build-app.outputs.version }}'
