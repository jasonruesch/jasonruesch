# This workflow will build and deploy a site to Vercel as a preview environment

name: Pull Request CI/CD

on:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  actions: read
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# Cancel in-progress runs.
concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # Affected job
  affected:
    name: Affected
    runs-on: ubuntu-latest
    outputs:
      apps-matrix: ${{ steps.apps.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Connect your workspace on nx.app and uncomment this to enable task distribution.
      # The "--stop-agents-after" is optional, but allows idle agents to shut down once the "e2e-ci" targets have been requested
      # - run: npx nx-cloud start-ci-run --distribute-on="5 linux-medium-js" --stop-agents-after="e2e-ci"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Set SHAs for Nx
        id: set-shas
        uses: nrwl/nx-set-shas@v4

      - name: Run format check
        run: npx nx-cloud record -- nx format:check

      - name: Run affected lint and tests
        run: npx nx affected -t lint test e2e-ci

      - name: Affected apps
        id: apps
        run: |
          projects=$(npx nx show projects --projects apps/**/* --affected --with-target build --base "${{ steps.set-shas.outputs.base }}" --head "${{ steps.set-shas.outputs.head }}" | tr '\n' ' ' | xargs)
          list=($projects)
          items="["
          for project in "${list[@]}"; do
            items+="{\"project\":\"$project\"},"
          done
          items=$(echo "$items" | sed 's/,$//g')
          items+="]"
          [[ $items = "[]" ]] && matrix="" || matrix="{\"include\":$items}"
          echo "$projects"
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

      - name: Build affected libs
        run: npx nx affected -t build --exclude apps/**/*

  # Build job
  build-app:
    name: Build App
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    environment:
      name: Preview
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.apps-matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.apps-matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}
          path: .vercel/output

  # Deploy job
  deploy-preview:
    name: Deploy to Preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    environment:
      name: Preview
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - affected
      - build-app
    if: ${{ needs.affected.outputs.apps-matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.apps-matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.project }}
          path: .vercel/output

      - name: Deploy Project Artifacts to Vercel
        id: deployment
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} > /dev/stdout)
          echo "$url"
          echo "page_url=$url" >> $GITHUB_OUTPUT
