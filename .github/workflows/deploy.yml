# This workflow will build and deploy a site to another repo when a tag is pushed

name: Deploy Jason Ruesch

on:
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'deploy-${{ github.ref_name }}'
  cancel-in-progress: true

jobs:
  # Deployment job
  deploy-production:
    name: Deploy to Production
    environment:
      name: Production
      url: https://jasonruesch.dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifact
        id: download
        run: gh run download -n ${{ github.ref_name }} -D ./output
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: cpina/github-action-push-to-another-repository@ssh-deploy-key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: './output'
          destination-github-username: 'jasonruesch'
          destination-repository-name: 'jasonruesch.github.io'
          user-email: jason.ruesch@me.com
          commit-message: 'chore(release): ${{  github.ref_name }}'
          target-branch: main
