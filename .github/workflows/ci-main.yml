name: Main Branch CI

on:
  push:
    branches:
      - 'main'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these deployments to complete.
concurrency:
  group: 'main'
  cancel-in-progress: false

jobs:
  # Build job
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    name: Main
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run format check
        run: npx nx-cloud record -- nx format:check

      - name: Run affected lint and tests
        run: npx nx affected -t lint test e2e-ci

      - name: Update version
        working-directory: ./apps/jasonruesch
        run: npm version prerelease --preid=staging --no-git-tag-version

      - name: Build
        run: npx nx affected -t build

      # Check if build output exists for each app to deploy

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Jason Ruesch app
      - name: Check build output for Jason Ruesch
        uses: andstor/file-existence-action@v3
        id: jasonruesch_check_files
        with:
          files: './dist/apps/jasonruesch/**'

      - name: Upload GitHub Pages artifact for Jason Ruesch
        if: steps.jasonruesch_check_files.outputs.files_exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/apps/jasonruesch

      # Other apps...

      # Commit any app version bumps
      - name: Commit version bumps
        run: |
          git add -A
          git commit -m "chore(release): staging" -n
          git push
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

  # Deployment job for jasonruesch
  deploy-jasonruesch:
    name: Deploy Jason Ruesch
    environment:
      name: Staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
