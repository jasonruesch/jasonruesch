name: Main Branch CI

on:
  push:
    branches:
      - 'main'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these deployments to complete.
concurrency:
  group: 'main'
  cancel-in-progress: false

jobs:
  affected:
    name: Affected
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.affected.outputs.projects }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run format check
        run: npx nx-cloud record -- nx format:check

      - name: Run affected lint and tests
        run: npx nx affected -t lint test e2e-ci

      - name: Affected build projects
        id: affected
        run: |
          PROJECTS=$(npx nx show projects --projects jasonruesch --affected --with-target build --json)
          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT

  # Build job
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    name: Build
    runs-on: ubuntu-latest
    needs: affected
    strategy:
      matrix:
        name: ${{ fromJson(needs.affected.outputs.projects) }}
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Update version
        id: version
        working-directory: ./apps/${{ matrix.name }}
        run: |
          VERSION=$(npm version prerelease --preid=staging --no-git-tag-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build ${{ matrix.name }}
        run: npx nx build ${{ matrix.name }} --skip-nx-cache

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/apps/${{ matrix.name }}

      - name: Commit version bump
        run: |
          git add ./apps/${{ matrix.name }}/package.json
          git commit -m "chore(release): ${{ matrix.name }}@${{ steps.version.outputs.version }}" -n
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Push changes
        run: |
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

  # Deployment job
  deploy:
    name: Deploy
    environment:
      name: Staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check if artifact exists
        uses: LIT-Protocol/artifact-exists-action@v0
        id: check_artifact
        with:
          name: 'github-pages'

      - name: Deploy to GitHub Pages
        if: steps.check_artifact.outputs.exists == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
