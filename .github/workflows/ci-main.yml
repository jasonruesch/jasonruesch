# This workflow will build and deploy a site to GitHub Pages

name: Main Branch CI

on:
  push:
    branches:
      - 'main'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these deployments to complete.
concurrency:
  group: 'main'
  cancel-in-progress: false

jobs:
  # Affected job
  affected:
    name: Affected
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.projects.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run format check
        run: npx nx-cloud record -- nx format:check

      - name: Run affected lint and tests
        run: npx nx affected -t lint test e2e-ci

      - name: Affected projects
        id: projects
        run: |
          projects=$(npx nx show projects --projects jasonruesch --affected --with-target build | tr '\n' ' ' | xargs)
          list=($projects)
          items="["
          for project in "${list[@]}"; do
            items+="{\"project\":\"$project\"},"
          done
          items=$(echo "$items" | sed 's/,$//g')
          items+="]"
          [[ $items = "[]" ]] && matrix="" || matrix="{\"include\":$items}"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # Build job
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.matrix) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Update version
        run: npx nx release version --projects ${{ matrix.project }} --git-commit=false --stage-changes=false --git-tag

      - name: Version
        id: version
        run: |
          version=$(npm pkg get version --prefix=./apps/${{ matrix.project }})
          echo "version=${version//\"/}" >> $GITHUB_OUTPUT

      - name: Build
        run: npx nx build ${{ matrix.project }} --skip-nx-cache

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Upload artifact for Staging deployment to GitHub Pages
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: 'github-pages-${{ matrix.project }}@${{ steps.version.outputs.version }}'
          path: ./dist/apps/${{ matrix.project }}

      # Upload artifact for Production deployment to another repository
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ matrix.project }}@${{ steps.version.outputs.version }}'
          path: ./dist/apps/${{ matrix.project }}

      - name: Push tags
        run: git push --tags

  # Deployment job
  deploy-staging:
    name: Deploy to Staging
    environment:
      name: Staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - affected
      - build
    if: ${{ needs.affected.outputs.matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.matrix) }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: 'github-pages-${{ matrix.project }}@${{ needs.build.outputs.version }}'
