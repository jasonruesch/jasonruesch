# This workflow will build and upload an artifact

name: Build Artifact CI/CD

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Test job
  test:
    # Only run this job if the branch is a tag
    if: startsWith(github.ref, 'refs/tags/')
    name: Test
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.details.outputs.project }}
      version: ${{ steps.details.outputs.version }}
      path: ${{ steps.details.outputs.path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run format check
        run: npx nx-cloud record -- nx format:check

      - name: Project details
        id: details
        run: |
          project=${GITHUB_REF_NAME%%@*}
          version=${GITHUB_REF_NAME##*@}
          path=$(npx nx show project $project | jq -r .root)
          echo "project=$project" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "path=$path" >> $GITHUB_OUTPUT

      - name: Run lint and tests
        run: npx nx run-many -t lint test e2e-ci --projects ${{ steps.details.outputs.project }} --skip-nx-cache

  # Build job
  build-lib:
    name: Build Library
    runs-on: ubuntu-latest
    needs: test
    if: ${{ startsWith(needs.test.outputs.path, 'libs') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx nx build ${{ needs.test.outputs.project }} --skip-nx-cache

      # Upload artifact for publishing to GitHub Packages
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ needs.test.outputs.project }}@${{ needs.test.outputs.version }}'
          path: ./dist/${{ needs.test.outputs.path }}

  # Build job
  build-app:
    name: Build App
    runs-on: ubuntu-latest
    needs: test
    if: ${{ startsWith(needs.test.outputs.path, 'apps') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx nx build ${{ needs.test.outputs.project }} --skip-nx-cache

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Upload artifact for Staging deployment to GitHub Pages
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: 'github-pages-${{ needs.test.outputs.project }}@${{ needs.test.outputs.version }}'
          path: ./dist/${{ needs.test.outputs.path }}

      # Upload artifact for Production deployment to another repository
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ needs.test.outputs.project }}@${{ needs.test.outputs.version }}'
          path: ./dist/${{ needs.test.outputs.path }}

