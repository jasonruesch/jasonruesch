# This workflow will build and deploy a site to another repo when a tag is pushed

name: Deploy Jason Ruesch

on:
  push:
    tags: ['jasonruesch@*']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'deploy-jasonruesch'
  cancel-in-progress: true

jobs:
  # Build job
  build:
    if: ${{ !(startsWith(github.event.head_commit.message, 'chore(release):') && contains(github.event.head_commit.message, '-staging.'))}}
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git Identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: npx nx build ${GITHUB_REF_NAME%%@*} --skip-nx-cache

      - name: Upload GitHub Pages artifact for ${GITHUB_REF_NAME%%@*}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/apps/${GITHUB_REF_NAME%%@*}

      - name: Upload artifact for ${GITHUB_REF_NAME%%@*}
        uses: actions/upload-artifact@v4
        with:
          name: ${GITHUB_REF_NAME%%@*}
          path: ./dist/apps/${GITHUB_REF_NAME%%@*}

  # Deployment job
  deploy-staging:
    name: Deploy to Staging
    environment:
      name: Staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deployment job
  deploy-production:
    name: Deploy to Production
    environment:
      name: Production
      url: https://jasonruesch.dev
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${GITHUB_REF_NAME%%@*}
          path: ./dist/apps/${GITHUB_REF_NAME%%@*}

      - uses: cpina/github-action-push-to-another-repository@ssh-deploy-key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: dist/apps/${GITHUB_REF_NAME%%@*}/
          destination-github-username: 'jasonruesch'
          destination-repository-name: 'jasonruesch.github.io'
          user-email: jason.ruesch@me.com
          commit-message: 'chore(release): ${{  github.ref_name }}'
          target-branch: main
